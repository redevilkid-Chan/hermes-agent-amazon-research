<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#f0f6fc;--dim:#8b949e;--blue:#58a6ff;--green:#3fb950;--orange:#f78166;--purple:#bc8cff;--red:#f85149;--pink:#db61a2;--yellow:#d29922;--radius:8px;--gap:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:32px;max-width:1400px;margin:0 auto}
h1{font-size:24px;margin-bottom:4px}
h1 span{color:var(--blue)}
.sub{color:var(--dim);font-size:13px;margin-bottom:24px}

/* summary cards */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--gap);margin-bottom:24px}
.s-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:border-color .2s}
.s-card:hover{border-color:var(--blue)}
.s-card .label{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.s-card .value{font-size:26px;font-weight:700}
.s-card .value.blue{color:var(--blue)} .s-card .value.green{color:var(--green)} .s-card .value.orange{color:var(--orange)} .s-card .value.purple{color:var(--purple)}
.s-card .hint{color:var(--dim);font-size:11px;margin-top:4px}

/* toolbar */
.toolbar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.toolbar select,.toolbar input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:13px;outline:none}
.toolbar select:focus,.toolbar input:focus{border-color:var(--blue)}
.toolbar input[type=text]{width:200px}
.toolbar .spacer{flex:1}
.toolbar .btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .15s}
.toolbar .btn:hover{border-color:var(--blue);color:var(--blue)}
.toolbar .btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.toolbar .btn.primary:hover{opacity:.85}
.tag{display:inline-block;font-size:11px;border:1px solid var(--border);border-radius:4px;padding:2px 7px;margin:1px;cursor:pointer;transition:all .12s}
.tag:hover{border-color:var(--blue)} .tag.active{background:var(--blue);border-color:var(--blue);color:#fff}

/* stats row */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap);margin-bottom:24px}
.stats-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.stats-box .title{font-size:13px;font-weight:600;margin-bottom:14px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}

/* category bars */
.cat-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cat-bar .cat-name{width:50px;font-size:12px;text-align:right;flex-shrink:0}
.cat-bar .bar-track{flex:1;height:18px;background:var(--bg);border-radius:4px;overflow:hidden}
.cat-bar .bar-fill{height:100%;border-radius:4px;transition:width .5s;min-width:3px}
.cat-bar .bar-num{font-size:12px;color:var(--dim);width:40px;flex-shrink:0}
.cat-bar .bar-num strong{color:var(--text)}

/* timeline */
.timeline{position:relative;padding-left:32px}
.tl-day{margin-bottom:14px;position:relative}
.tl-day::before{content:'';position:absolute;left:-19px;top:6px;width:8px;height:8px;border-radius:50%;background:var(--blue);border:2px solid var(--bg);z-index:1}
.tl-day:after{content:'';position:absolute;left:-16px;top:14px;width:1px;height:calc(100% + 14px);background:var(--border)}
.tl-day:last-child:after{display:none}
.tl-date{font-size:12px;color:var(--dim);margin-bottom:6px;font-weight:500}
.tl-item{font-size:12px;padding:3px 0;display:flex;align-items:center;gap:8px}
.tl-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tl-dot.ops{background:var(--blue)} .tl-dot.amazon{background:var(--orange)} .tl-dot.tools{background:var(--purple)} .tl-dot.personal{background:var(--green)}
.tl-name{color:var(--text)} .tl-h{color:var(--dim);font-size:11px;margin-left:auto}

/* table */
.tbl-wrap{overflow-x:auto;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--dim);font-size:11px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:var(--text)}
th .sort-arrow{margin-left:4px;font-size:10px}
tbody tr{border-bottom:1px solid #21262d;cursor:pointer;transition:background .12s}
tbody tr:hover{background:#1c2128}
tbody tr.selected{background:#1f2937;border-left:2px solid var(--blue)}
td{padding:10px 12px;vertical-align:top}
td.summary{max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.status .check{color:var(--green)}
.cat-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.cat-badge.ops{background:#1c2640;color:var(--blue)}
.cat-badge.amazon{background:#2d1a10;color:var(--orange)}
.cat-badge.tools{background:#201845;color:var(--purple)}
.cat-badge.personal{background:#0e2d1a;color:var(--green)}

/* selected count */
.sel-info{font-size:12px;color:var(--dim);display:none}
.sel-info.show{display:inline}

/* expanded row */
tr.expand-row{display:none;background:#111820}
tr.expand-row.show{display:table-row}
tr.expand-row td{padding:14px 20px;font-size:12px;color:var(--dim);line-height:1.7;border-bottom:1px solid var(--green)}
tr.expand-row strong{color:var(--text)}
tr.expand-row .file-path{font-family:'SF Mono',monospace;font-size:11px;color:var(--blue);display:block;margin-top:4px;word-break:break-all}
.meta-row{display:flex;gap:24px;flex-wrap:wrap}
.meta-row>div{min-width:80px}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:10px 24px;border-radius:6px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}

@media (max-width:900px){.summary{grid-template-columns:repeat(2,1fr)} .stats-row{grid-template-columns:1fr} body{padding:16px}}
</style>
</head>

  const days={};
  raw.forEach(r=>{
    if(!days[r.time]) days[r.time]={total:0,items:[]};
    days[r.time].items.push(r);
    days[r.time].total+=r.hours;
  });
  const sortedDays=Object.keys(days).sort().reverse();
  const html=sortedDays.map(d=>{
    const day=days[d];
    const items=day.items.map(r=>`
      <div class="tl-item">
        <span class="tl-dot ${dt[r.cat]}"></span>
        <span class="tl-name">${r.name}</span>
        <span class="tl-h">${r.hours}h</span>
      </div>`).join('');
    return `<div class="tl-day"><div class="tl-date">📅 ${d} · ${day.items.length}项 · ${day.total}h</div>${items}</div>`;
  }).join('');
  document.getElementById('timeline').innerHTML=html;
}

function getFiltered(){
  const cat=document.getElementById('filterCat').value;
  const q=document.getElementById('filterSearch').value.toLowerCase();
  return raw.filter(r=>{
    if(cat&&r.cat!==cat) return false;
    if(q&&!r.name.toLowerCase().includes(q)&&!r.tags.toLowerCase().includes(q)&&!r.summary.toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderTable(){
  let data=getFiltered();
  // sort
  const numericKeys=['耗时(h)'];
  data.sort((a,b)=>{
    let va=a[sortKey], vb=b[sortKey];
    if(va==null) va=''; if(vb==null) vb='';
    if(numericKeys.includes(sortKey)){va=+va;vb=+vb;}
    if(va<vb) return sortAsc?-1:1;
    if(va>vb) return sortAsc?1:-1;
    return 0;
  });

  document.getElementById('cardTotal').textContent=data.length;

  const html=data.map((r,i)=>{
    const idx=raw.indexOf(r);
    const sel=selected.has(idx)?' selected':'';
    return `<tr class="${sel}" onclick="toggleRow(${idx},event)" id="row${idx}">
      <td onclick="event.stopPropagation()"><input type="checkbox" ${sel?'checked':''} onchange="toggleSelect(${idx},this.checked)"></td>
      <td>${r.time}</td>
      <td><span class="cat-badge ${dt[r.cat]}">${r.cat}</span></td>
      <td style="font-weight:600">${r.name}</td>
      <td class="summary" title="${esc(r.summary)}">${r.summary}</td>
      <td style="font-variant-numeric:tabular-nums">${r.hours}h</td>
      <td>${r.tags.split(',').map(t=>`<span class="tag" onclick="event.stopPropagation();tagClick('${t.trim()}')">${t.trim()}</span>`).join('')}</td>
    </tr>
    <tr class="expand-row" id="expand${idx}">
      <td colspan="7">
        <div class="meta-row">
          <div><strong>📝 摘要</strong><br>${r.summary}</div>
          <div><strong>📁 交付物</strong><br>${(r.files||'无').split('\n').map(f=>`<span class="file-path">${f}</span>`).join('')}</div>
          <div><strong>💬 备注</strong><br>${r.note||'—'}</div>
          <div><strong>💰 API</strong><br>${r.tokens?r.tokens.toLocaleString()+' tokens · ¥'+r.cost:'—'}</div>
        </div>
      </td>
    </tr>`;
  }).join('');
  document.getElementById('tbody').innerHTML=html;
  updateSelInfo();
}

function esc(s){return s.replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function toggleRow(idx){
  const el=document.getElementById('expand'+idx);
  if(el) el.classList.toggle('show');
}

function toggleSelect(idx,checked){
  if(checked) selected.add(idx); else selected.delete(idx);
  updateSelInfo();
  document.getElementById('row'+idx)?.classList.toggle('selected',checked);
}

function toggleAll(force){
  const data=getFiltered();
  const idxs=data.map(r=>raw.indexOf(r));
  if(force===undefined) force=selected.size<idxs.length;
  idxs.forEach(i=>{
    if(force) selected.add(i); else selected.delete(i);
    document.getElementById('row'+i)?.classList.toggle('selected',force);
  });
  updateSelInfo();
  document.getElementById('checkAll').checked=force;
}

function clearSelection(){selected.clear();toggleAll(false);}

function updateSelInfo(){
  document.getElementById('selCount').textContent=selected.size;
  document.getElementById('selInfo').classList.toggle('show',selected.size>0);
}

function tagClick(tag){
  document.getElementById('filterSearch').value=tag;
  applyFilters();
}

function applyFilters(){
  selected.clear();
  document.getElementById('checkAll').checked=false;
  renderTable();
}

function sortTable(key){
  if(sortKey===key) sortAsc=!sortAsc; else{sortKey=key;sortAsc=true;}
  document.querySelectorAll('th .sort-arrow').forEach(a=>a.textContent='');
  const th=document.querySelector(`th[onclick="sortTable('${key}')"] .sort-arrow`);
  if(th) th.textContent=sortAsc?'▲':'▼';
  renderTable();
}

function exportSelected(){
  if(selected.size===0){toast('请先勾选要导出的项目');return;}
  const items=[...selected].map(i=>raw[i]).sort((a,b)=>b.time.localeCompare(a.time));
  const md=['# 📋 项目日志导出','','> 导出时间: '+new Date().toLocaleString('zh-CN'),'> 共 '+items.length+' 项','---',''];
  items.forEach(r=>{
    md.push(`## ${r.name}`);
    md.push(`- **日期:** ${r.time}  |  **分类:** ${r.cat}  |  **耗时:** ${r.hours}h  |  **状态:** ${r.status}`);
    md.push(`- **摘要:** ${r.summary}`);
    md.push(`- **交付物:** ${(r.files||'无').replace(/\n/g,' , ')}`);
    if(r.note) md.push(`- **备注:** ${r.note}`);
    if(r.tokens) md.push(`- **API:** ${r.tokens.toLocaleString()} tokens · ¥${r.cost}`);
    md.push('');
  });
  navigator.clipboard.writeText(md.join('\n')).then(()=>toast('✅ 已复制 '+items.length+' 条 · Markdown 格式'));
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// init
renderAll();
</script>
</body>
</html>
